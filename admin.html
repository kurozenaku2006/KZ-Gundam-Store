<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KUROZENAKU ADMIN</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>

    body{
      font-family:'Inter',sans-serif;
      background:
      radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
      color:white;
      overflow-x:hidden;
    }

    .logo-font{
      font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;
    }

    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
    }

    .drawer{
      transition:all .3s ease;
    }

    .card-glow{
      box-shadow:
      0 0 20px rgba(34,211,238,.15),
      0 0 35px rgba(16,185,129,.08);
    }

    .menu-btn{
      transition:.25s ease;
    }

    .menu-btn:hover{
      transform:translateX(6px);
      box-shadow:0 0 25px rgba(0,255,255,.25);
    }

    .neon-button{
      background:linear-gradient(to right,#06b6d4,#10b981);
      box-shadow:0 0 25px rgba(20,184,166,.45);
      transition:.3s ease;
    }

    .neon-button:hover{
      transform:translateY(-2px) scale(1.03);
      box-shadow:0 0 40px rgba(20,184,166,.9);
      filter:brightness(1.1);
    }

  </style>

</head>

<body>

<div
  x-data="adminApp()"
  x-init="init()"
  class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->

  <div class="glass rounded-3xl p-5 flex justify-between items-center mb-6 shadow-2xl">

    <div>

      <h1 class="logo-font text-3xl md:text-4xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        KUROZENAKU ADMIN
      </h1>

      <p class="text-gray-400 text-sm mt-1">
        Premium Dashboard Control
      </p>

    </div>

    <button
      @click="menuOpen = true"
      class="glass px-5 py-3 rounded-2xl hover:bg-white/10 active:scale-95 transition-all duration-300">

      ☰ Menu

    </button>

  </div>

  <!-- TOP STATS -->

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-8">

    <div class="glass rounded-3xl p-5 card-glow">
      <p class="text-gray-400 text-sm mb-2">Total Kits</p>
      <h2 class="text-4xl font-black text-cyan-300" x-text="products.length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 card-glow">
      <p class="text-gray-400 text-sm mb-2">Pending Claims</p>
      <h2 class="text-4xl font-black text-yellow-300" x-text="pendingClaims"></h2>
    </div>

    <div class="glass rounded-3xl p-5 card-glow">
      <p class="text-gray-400 text-sm mb-2">Approved</p>
      <h2 class="text-4xl font-black text-emerald-300" x-text="approvedClaims"></h2>
    </div>

    <div class="glass rounded-3xl p-5 card-glow">
      <p class="text-gray-400 text-sm mb-2">Revenue</p>
      <h2 class="text-4xl font-black text-pink-300">
        ₹<span x-text="totalRevenue"></span>
      </h2>
    </div>

  </div>

  <!-- PAGE TITLE -->

  <div class="flex justify-between items-center mb-6">

    <h2
      class="text-3xl font-black"
      x-text="currentPage">
    </h2>

    <button
      x-show="currentPage === 'Manage Kits'"
      class="neon-button px-6 py-3 rounded-2xl font-black">

      + Add Kit

    </button>

  </div>

  <!-- MANAGE KITS -->

  <div x-show="currentPage === 'Manage Kits'">

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">

      <template x-for="p in products" :key="p.id">

        <div class="glass rounded-3xl p-4 card-glow">

          <div class="bg-black/20 rounded-2xl overflow-hidden mb-4">

            <img
              :src="p.image"
              class="h-44 w-full object-contain p-4">

          </div>

          <h2
            class="font-bold text-lg mb-2"
            x-text="p.name">
          </h2>

          <div class="flex justify-between items-center mb-4">

            <p class="text-cyan-300 font-black text-2xl">
              ₹<span x-text="p.price"></span>
            </p>

            <p class="text-gray-400 text-sm">
              Stock:
              <span x-text="p.stock"></span>
            </p>

          </div>

          <div class="flex gap-2">

            <button
              class="flex-1 neon-button py-3 rounded-2xl font-bold">
              Edit
            </button>

            <button
              class="glass py-3 px-4 rounded-2xl hover:bg-red-500/20 transition">
              🗑
            </button>

          </div>

        </div>

      </template>

    </div>

  </div>

  <!-- MANAGE APPROVAL -->

  <div x-show="currentPage === 'Manage Approval'">

    <div class="space-y-5">

      <template x-for="c in claims" :key="c.id">

        <div class="glass rounded-3xl p-5 card-glow">

          <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">

            <div>

              <h2
                class="text-2xl font-black mb-2"
                x-text="c.productName">
              </h2>

              <p class="text-gray-300">
                Customer:
                <span x-text="c.customerName || 'Unknown'"></span>
              </p>

              <p class="text-gray-400 text-sm mt-1">
                Status:
                <span
                  class="text-cyan-300 font-bold"
                  x-text="c.status || 'pending'">
                </span>
              </p>

            </div>

            <div class="flex gap-3">

              <button
                class="neon-button px-6 py-3 rounded-2xl font-black">

                APPROVE

              </button>

              <button
                class="glass px-6 py-3 rounded-2xl hover:bg-red-500/20 transition font-black">

                REJECT

              </button>

            </div>

          </div>

        </div>

      </template>

    </div>

  </div>

  <!-- ANALYSIS -->

  <div x-show="currentPage === 'Analysis'">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

      <div class="glass rounded-3xl p-6 card-glow">

        <h2 class="text-2xl font-black mb-4">
          Most Claimed Kits
        </h2>

        <div class="space-y-4">

          <template x-for="p in products.slice(0,4)">

            <div class="glass rounded-2xl p-4 flex justify-between">

              <span x-text="p.name"></span>

              <span class="text-cyan-300 font-bold">
                Popular
              </span>

            </div>

          </template>

        </div>

      </div>

      <div class="glass rounded-3xl p-6 card-glow">

        <h2 class="text-2xl font-black mb-4">
          Stock Alerts
        </h2>

        <div class="space-y-4">

          <template x-for="p in products.filter(x => x.stock <= 1)">

            <div class="glass rounded-2xl p-4 flex justify-between">

              <span x-text="p.name"></span>

              <span class="text-red-300 font-bold">
                LOW
              </span>

            </div>

          </template>

        </div>

      </div>

    </div>

  </div>

  <!-- REVENUE -->

  <div x-show="currentPage === 'Revenue'">

    <div class="glass rounded-3xl p-6 card-glow">

      <h2 class="text-3xl font-black text-emerald-300 mb-6">
        Revenue Summary
      </h2>

      <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">

        <div class="glass rounded-2xl p-5">
          <p class="text-gray-400 text-sm mb-2">Today</p>
          <h2 class="text-3xl font-black text-cyan-300">₹12,000</h2>
        </div>

        <div class="glass rounded-2xl p-5">
          <p class="text-gray-400 text-sm mb-2">Weekly</p>
          <h2 class="text-3xl font-black text-emerald-300">₹48,000</h2>
        </div>

        <div class="glass rounded-2xl p-5">
          <p class="text-gray-400 text-sm mb-2">Monthly</p>
          <h2 class="text-3xl font-black text-pink-300">₹1,80,000</h2>
        </div>

        <div class="glass rounded-2xl p-5">
          <p class="text-gray-400 text-sm mb-2">Projected</p>
          <h2 class="text-3xl font-black text-yellow-300">₹3,50,000</h2>
        </div>

      </div>

    </div>

  </div>

  <!-- MENU OVERLAY -->

  <div
    x-show="menuOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="menuOpen = false">
  </div>

  <!-- MENU DRAWER -->

  <div
    x-show="menuOpen"
    x-transition
    class="drawer fixed top-0 left-0 h-full w-80 glass z-50 p-6 border-r border-white/10">

    <div class="flex justify-between items-center mb-8">

      <h2 class="text-3xl font-black">
        Dashboard
      </h2>

      <button
        @click="menuOpen=false"
        class="glass px-3 py-2 rounded-xl hover:bg-white/10 transition">

        ✕

      </button>

    </div>

    <div class="space-y-4">

      <button
        @click="changePage('Manage Kits')"
        class="menu-btn w-full glass p-5 rounded-2xl text-left text-lg font-bold hover:bg-white/10">

        📦 Manage Kits

      </button>

      <button
        @click="changePage('Manage Approval')"
        class="menu-btn w-full glass p-5 rounded-2xl text-left text-lg font-bold hover:bg-white/10">

        ✅ Manage Approval

      </button>

      <button
        @click="changePage('Analysis')"
        class="menu-btn w-full glass p-5 rounded-2xl text-left text-lg font-bold hover:bg-white/10">

        📊 Analysis

      </button>

      <button
        @click="changePage('Revenue')"
        class="menu-btn w-full glass p-5 rounded-2xl text-left text-lg font-bold hover:bg-white/10">

        💰 Revenue

      </button>

    </div>

  </div>

</div>

<script>

function adminApp(){

  return {

    menuOpen:false,

    currentPage:'Manage Kits',

    products:[],
    claims:[],

    totalRevenue:0,
    pendingClaims:0,
    approvedClaims:0,

    init(){

      const firebaseConfig = {

        apiKey:'AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg',

        authDomain:'kurozenaku-gundam-store.firebaseapp.com',

        projectId:'kurozenaku-gundam-store'

      };

      if(!firebase.apps.length){

        firebase.initializeApp(firebaseConfig);

      }

      const db = firebase.firestore();

      db.collection('products').onSnapshot((snapshot)=>{

        this.products = snapshot.docs.map(doc => ({

          id:doc.id,
          ...doc.data()

        }));

      });

      db.collection('claims').onSnapshot((snapshot)=>{

        this.claims = snapshot.docs.map(doc => ({

          id:doc.id,
          ...doc.data()

        }));

        this.pendingClaims =
        this.claims.filter(c => c.status === 'pending').length;

        this.approvedClaims =
        this.claims.filter(c => c.status === 'approved').length;

        this.totalRevenue = this.claims
        .filter(c => c.status === 'approved')
        .reduce((sum,c)=> sum + (c.price || 0),0);

      });

    },

    changePage(page){

      this.currentPage = page;

      this.menuOpen = false;

    }

  }

}

</script>

</body>
</html>
