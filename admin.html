
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KUROZENAKU ADMIN</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:
      radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
      color:white;
      overflow-x:hidden;
    }

    .logo-font{
      font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;
    }

    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
    }

    .drawer{
      transition:all .3s ease;
    }

    .glow{
      box-shadow:
      0 0 15px rgba(34,211,238,.25),
      0 0 35px rgba(16,185,129,.15);
    }

    .card-hover{
      transition:.25s ease;
    }

    .card-hover:hover{
      transform:translateY(-6px);
      box-shadow:
      0 0 20px rgba(34,211,238,.2),
      0 0 40px rgba(16,185,129,.15);
    }

    .tab-active{
      background:linear-gradient(to right,#06b6d4,#10b981);
      color:white;
      box-shadow:0 0 20px rgba(16,185,129,.5);
    }

    input,select{
      outline:none;
    }
  </style>
</head>

<body>

<div x-data="adminApp()" x-init="init()" class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->
  <div class="glass rounded-3xl p-5 flex justify-between items-center mb-6 glow">

    <div>
      <h1 class="logo-font text-3xl md:text-4xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        KUROZENAKU ADMIN
      </h1>

      <p class="text-gray-400 text-sm mt-1">
        Realtime Gundam Management System
      </p>
    </div>

    <button
      @click="drawerOpen=true"
      class="glass px-5 py-3 rounded-2xl hover:bg-white/10 transition-all duration-300">
      ☰ Menu
    </button>

  </div>

  <!-- DRAWER -->
  <div
    x-show="drawerOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="drawerOpen=false">
  </div>

  <div
    x-show="drawerOpen"
    x-transition
    class="drawer fixed top-0 right-0 h-full w-80 glass z-50 p-6 border-l border-white/10 overflow-y-auto">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold">Dashboard</h2>

      <button
        @click="drawerOpen=false"
        class="glass px-3 py-2 rounded-xl hover:bg-white/10">
        ✕
      </button>
    </div>

    <div class="space-y-3">

      <button
        @click="section='kits'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">
        📦 Manage Kits
      </button>

      <button
        @click="section='claims'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">
        ✅ Manage Claims
      </button>

      <button
        onclick="window.location.href='index.html'"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">
        🏠 Storefront
      </button>

    </div>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 lg:grid-cols-6 gap-4 mb-8">

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">TOTAL CLAIMS</p>
      <h2 class="text-3xl font-black mt-2" x-text="claims.length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">PENDING</p>
      <h2 class="text-3xl font-black mt-2 text-yellow-300" x-text="pendingClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">APPROVED</p>
      <h2 class="text-3xl font-black mt-2 text-emerald-300" x-text="approvedClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">REJECTED</p>
      <h2 class="text-3xl font-black mt-2 text-red-300" x-text="rejectedClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">REVENUE</p>
      <h2 class="text-2xl font-black mt-2 text-cyan-300">
        ₹<span x-text="revenue()"></span>
      </h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">LOW STOCK</p>
      <h2 class="text-3xl font-black mt-2 text-orange-300" x-text="lowStockCount()"></h2>
    </div>

  </div>

  <!-- CLAIMS -->
  <div x-show="section==='claims'">

    <div class="flex flex-wrap gap-3 mb-6 mt-6">

      <button
        @click="claimTab='all'"
        :class="claimTab==='all' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl">
        ALL
      </button>

      <button
        @click="claimTab='pending'"
        :class="claimTab==='pending' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl">
        PENDING
      </button>

      <button
        @click="claimTab='approved'"
        :class="claimTab==='approved' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl">
        APPROVED
      </button>

      <button
        @click="claimTab='rejected'"
        :class="claimTab==='rejected' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl">
        REJECTED
      </button>

    </div>

    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">

      <template x-for="claim in filteredClaims()" :key="claim.id">

        <div class="glass rounded-3xl p-5 glow card-hover">

          <h2 class="text-xl font-bold" x-text="claim.productName"></h2>

          <p class="text-cyan-300 text-2xl font-black mt-2">
            ₹<span x-text="claim.price"></span>
          </p>

          <div class="mt-4 space-y-2 text-sm">

            <div class="glass rounded-2xl p-3">
              <p class="text-gray-400 text-xs mb-1">CUSTOMER</p>
              <p class="font-bold text-white" x-text="claim.customerName || 'Unknown'"></p>
            </div>

            <div class="glass rounded-2xl p-3">
              <p class="text-gray-400 text-xs mb-1">CONTACT</p>
              <p class="font-bold text-cyan-300 break-all" x-text="claim.contact || 'N/A'"></p>
            </div>

          </div>

          <!-- STATUS -->
          <div class="mt-4">

            <span
              x-show="claim.status==='pending'"
              class="px-3 py-1 rounded-xl bg-yellow-500/20 text-yellow-300 text-sm">
              Pending
            </span>

            <span
              x-show="claim.status==='approved'"
              class="px-3 py-1 rounded-xl bg-emerald-500/20 text-emerald-300 text-sm">
              Approved
            </span>

            <span
              x-show="claim.status==='rejected'"
              class="px-3 py-1 rounded-xl bg-red-500/20 text-red-300 text-sm">
              Rejected
            </span>

          </div>

          <!-- PENDING ACTIONS -->
          <div x-show="claim.status==='pending'" class="flex gap-3 mt-5">

            <button
              @click="approveClaim(claim)"
              class="flex-1 bg-gradient-to-r from-emerald-500 to-cyan-500 py-3 rounded-2xl font-bold">
              ✔ APPROVE
            </button>

            <button
              @click="rejectClaim(claim)"
              class="flex-1 bg-gradient-to-r from-red-500 to-pink-500 py-3 rounded-2xl font-bold">
              ✖ REJECT
            </button>

          </div>

          <!-- APPROVED ACTIONS -->
          <div x-show="claim.status==='approved'" class="flex gap-3 mt-5">

            <button
              @click="revertApprovedToPending(claim)"
              class="flex-1 bg-gradient-to-r from-yellow-500 to-orange-500 py-3 rounded-2xl font-bold">
              ↩ PENDING
            </button>

            <button
              @click="rejectApprovedClaim(claim)"
              class="flex-1 bg-gradient-to-r from-red-500 to-pink-500 py-3 rounded-2xl font-bold">
              ✖ REJECT
            </button>

          </div>

          <!-- REJECTED ACTIONS -->
          <div x-show="claim.status==='rejected'" class="flex gap-3 mt-5">

            <button
              @click="approveRejectedClaim(claim)"
              class="flex-1 bg-gradient-to-r from-emerald-500 to-cyan-500 py-3 rounded-2xl font-bold">
              ✔ APPROVE
            </button>

            <button
              @click="revertRejectedToPending(claim)"
              class="flex-1 bg-gradient-to-r from-yellow-500 to-orange-500 py-3 rounded-2xl font-bold">
              ↩ PENDING
            </button>

          </div>

        </div>

      </template>

    </div>

  </div>

</div>

<script>
function adminApp(){

  return {

    drawerOpen:false,
    section:'claims',
    claimTab:'all',

    claims:[],
    products:[],

    db:null,

    init(){

      const firebaseConfig = {
        apiKey:'YOUR_API_KEY',
        authDomain:'kurozenaku-gundam-store.firebaseapp.com',
        projectId:'kurozenaku-gundam-store'
      };

      if(!firebase.apps.length){
        firebase.initializeApp(firebaseConfig);
      }

      this.db = firebase.firestore();

      // CLAIMS
      this.db
      .collection('claims')
      .orderBy('createdAt','desc')
      .onSnapshot(snapshot => {

        this.claims = snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

      // PRODUCTS
      this.db
      .collection('products')
      .onSnapshot(snapshot => {

        this.products = snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

    },

    filteredClaims(){
      return this.claimTab === 'all'
      ? this.claims
      : this.claims.filter(c => c.status === this.claimTab);
    },

    pendingClaims(){
      return this.claims.filter(c => c.status === 'pending');
    },

    approvedClaims(){
      return this.claims.filter(c => c.status === 'approved');
    },

    rejectedClaims(){
      return this.claims.filter(c => c.status === 'rejected');
    },

    revenue(){
      return this.approvedClaims()
      .reduce((sum,c)=>sum + (c.price || 0),0);
    },

    lowStockCount(){
      return this.products.filter(p => (p.stock || 0) <= 1).length;
    },

    // APPROVE CLAIM
    async approveClaim(claim){

      try{

        const productRef =
        this.db.collection('products').doc(claim.productId);

        const claimRef =
        this.db.collection('claims').doc(claim.id);

        await this.db.runTransaction(async(transaction)=>{

          const productDoc = await transaction.get(productRef);
          const claimDoc = await transaction.get(claimRef);

          if(!productDoc.exists){
            throw new Error('Product missing');
          }

          if(!claimDoc.exists){
            throw new Error('Claim missing');
          }

          const product = productDoc.data();
          const currentClaim = claimDoc.data();

          if(currentClaim.status !== 'pending'){
            throw new Error('Already processed');
          }

          const quantity = currentClaim.quantity || 1;

          if((product.stock || 0) < quantity){
            throw new Error('Out of stock');
          }

          transaction.update(productRef,{
            stock:(product.stock || 0) - quantity,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });

          transaction.update(claimRef,{
            status:'approved',
            approvedAt:firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });

        });

      }catch(error){
        console.error(error);
        alert(error.message);
      }

    },

    // REJECT CLAIM
    async rejectClaim(claim){

      try{

        await this.db
        .collection('claims')
        .doc(claim.id)
        .update({
          status:'rejected',
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        });

      }catch(error){
        console.error(error);
        alert(error.message);
      }

    },

    // APPROVED -> PENDING
    async revertApprovedToPending(claim){

      try{

        const productRef =
        this.db.collection('products').doc(claim.productId);

        const claimRef =
        this.db.collection('claims').doc(claim.id);

        await this.db.runTransaction(async(transaction)=>{

          const productDoc = await transaction.get(productRef);
          const claimDoc = await transaction.get(claimRef);

          if(!productDoc.exists || !claimDoc.exists){
            throw new Error('Missing data');
          }

          const product = productDoc.data();
          const currentClaim = claimDoc.data();

          if(currentClaim.status !== 'approved'){
            throw new Error('Claim not approved');
          }

          const quantity = currentClaim.quantity || 1;

          transaction.update(productRef,{
            stock:(product.stock || 0) + quantity,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });

          transaction.update(claimRef,{
            status:'pending',
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });

        });

      }catch(error){
        console.error(error);
        alert(error.message);
      }

    },

    // APPROVED -> REJECTED
    async rejectApprovedClaim(claim){

      try{

        const productRef =
        this.db.collection('products').doc(claim.productId);

        const claimRef =
        this.db.collection('claims').doc(claim.id);

        await this.db.runTransaction(async(transaction)=>{

          const productDoc = await transaction.get(productRef);
          const claimDoc = await transaction.get(claimRef);

          if(!productDoc.exists || !claimDoc.exists){
            throw new Error('Missing data');
          }

          const product = productDoc.data();
          const currentClaim = claimDoc.data();

          if(currentClaim.status !== 'approved'){
            throw new Error('Claim not approved');
          }

          const quantity = currentClaim.quantity || 1;

          transaction.update(productRef,{
            stock:(product.stock || 0) + quantity,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });

          transaction.update(claimRef,{
            status:'rejected',
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });

        });

      }catch(error){
        console.error(error);
        alert(error.message);
      }

    },

    // REJECTED -> APPROVED
    async approveRejectedClaim(claim){

      try{

        const productRef =
        this.db.collection('products').doc(claim.productId);

        const claimRef =
        this.db.collection('claims').doc(claim.id);

        await this.db.runTransaction(async(transaction)=>{

          const productDoc = await transaction.get(productRef);
          const claimDoc = await transaction.get(claimRef);

          if(!productDoc.exists || !claimDoc.exists){
            throw new Error('Missing data');
          }

          const product = productDoc.data();
          const currentClaim = claimDoc.data();

          if(currentClaim.status !== 'rejected'){
            throw new Error('Claim not rejected');
          }

          const quantity = currentClaim.quantity || 1;

          if((product.stock || 0) < quantity){
            throw new Error('Out of stock');
          }

          transaction.update(productRef,{
            stock:(product.stock || 0) - quantity,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });

          transaction.update(claimRef,{
            status:'approved',
            approvedAt:firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });

        });

      }catch(error){
        console.error(error);
        alert(error.message);
      }

    },

    // REJECTED -> PENDING
    async revertRejectedToPending(claim){

      try{

        await this.db
        .collection('claims')
        .doc(claim.id)
        .update({
          status:'pending',
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        });

      }catch(error){
        console.error(error);
        alert(error.message);
      }

    }

  }

}
</script>

</body>
</html>
