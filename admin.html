<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KUROZENAKU ADMIN</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    body{
      font-family:'Inter',sans-serif;
      background:
      radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
      color:white;
      overflow-x:hidden;
    }

    .logo-font{
      font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;
    }

    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
    }

    .drawer{
      transition:.3s ease;
    }

    .card-hover{
      transition:.25s ease;
    }

    .card-hover:hover{
      transform:translateY(-5px);
      box-shadow:
      0 0 40px rgba(0,255,255,.18);
    }

    @keyframes pulseGlow{

      0%{
        box-shadow:0 0 10px rgba(20,184,166,.4);
      }

      50%{
        box-shadow:0 0 35px rgba(20,184,166,1);
      }

      100%{
        box-shadow:0 0 10px rgba(20,184,166,.4);
      }

    }

    .glow-button{
      animation:pulseGlow 2s infinite ease-in-out;
    }

  </style>

</head>

<body>

<div
  x-data="adminApp()"
  x-init="init()"
  class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->

  <div class="glass rounded-3xl p-5 flex justify-between items-center mb-6 shadow-2xl">

    <div>

      <h1 class="logo-font text-3xl md:text-4xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        KUROZENAKU ADMIN
      </h1>

      <p class="text-gray-400 text-sm mt-1">
        Realtime Management Dashboard
      </p>

    </div>

    <button
      @click="drawerOpen=true"
      class="glass px-5 py-3 rounded-2xl hover:bg-white/10 transition-all duration-300">

      ☰ Dashboard

    </button>

  </div>

  <!-- STATS -->

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">

    <div class="glass rounded-3xl p-5 card-hover">

      <p class="text-gray-400 text-sm mb-2">
        TOTAL CLAIMS
      </p>

      <h2
        class="text-4xl font-black text-cyan-300"
        x-text="claims.length">
      </h2>

    </div>

    <div class="glass rounded-3xl p-5 card-hover">

      <p class="text-gray-400 text-sm mb-2">
        APPROVED
      </p>

      <h2
        class="text-4xl font-black text-emerald-300"
        x-text="approvedCount">
      </h2>

    </div>

    <div class="glass rounded-3xl p-5 card-hover">

      <p class="text-gray-400 text-sm mb-2">
        PENDING
      </p>

      <h2
        class="text-4xl font-black text-yellow-300"
        x-text="pendingCount">
      </h2>

    </div>

    <div class="glass rounded-3xl p-5 card-hover">

      <p class="text-gray-400 text-sm mb-2">
        REVENUE
      </p>

      <h2 class="text-4xl font-black text-pink-300">

        ₹<span x-text="revenue"></span>

      </h2>

    </div>

  </div>

  <!-- APPROVALS PANEL -->

  <div
    x-show="activePanel === 'approvals'"
    x-transition>

    <div class="grid lg:grid-cols-2 gap-5">

      <template x-for="claim in claims" :key="claim.id">

        <div class="glass rounded-3xl p-5 card-hover">

          <!-- PRODUCT -->

          <div class="flex justify-between items-start mb-4">

            <div>

              <h2
                class="text-2xl font-black"
                x-text="claim.productName">
              </h2>

              <p class="text-cyan-300 text-xl font-bold mt-1">

                ₹<span x-text="claim.price"></span>

              </p>

            </div>

            <div
              class="px-4 py-2 rounded-2xl text-sm font-bold uppercase"
              :class="{

                'bg-yellow-500/20 text-yellow-300':
                claim.status === 'pending',

                'bg-emerald-500/20 text-emerald-300':
                claim.status === 'approved',

                'bg-red-500/20 text-red-300':
                claim.status === 'rejected'

              }">

              <span x-text="claim.status"></span>

            </div>

          </div>

          <!-- CUSTOMER -->

          <div class="space-y-3 mb-5">

            <div class="glass rounded-2xl p-3">

              <p class="text-gray-400 text-xs mb-1">
                CUSTOMER
              </p>

              <p
                class="font-bold text-white"
                x-text="claim.customerName || 'Unknown'">
              </p>

            </div>

            <div class="glass rounded-2xl p-3">

              <p class="text-gray-400 text-xs mb-1">
                CONTACT
              </p>

              <p
                class="font-bold text-cyan-300 break-all"
                x-text="claim.contact || 'N/A'">
              </p>

            </div>

            <div class="glass rounded-2xl p-3">

              <p class="text-gray-400 text-xs mb-1">
                ADDRESS
              </p>

              <p
                class="text-white whitespace-pre-line"
                x-text="claim.address || 'N/A'">
              </p>

            </div>

            <div
              x-show="claim.note"
              class="glass rounded-2xl p-3">

              <p class="text-gray-400 text-xs mb-1">
                NOTE
              </p>

              <p
                class="text-emerald-300 whitespace-pre-line"
                x-text="claim.note">
              </p>

            </div>

          </div>

          <!-- ACTIONS -->

          <div class="grid grid-cols-2 gap-3">

            <button
              @click="updateClaim(claim.id,'approved')"
              class="glow-button bg-gradient-to-r from-emerald-500 to-cyan-500 px-5 py-4 rounded-2xl font-black uppercase tracking-wider hover:brightness-125 transition-all duration-300">

              APPROVE

            </button>

            <button
              @click="updateClaim(claim.id,'rejected')"
              class="glass px-5 py-4 rounded-2xl font-black uppercase tracking-wider hover:bg-red-500/20 transition-all duration-300">

              REJECT

            </button>

          </div>

        </div>

      </template>

    </div>

  </div>

  <!-- MANAGE KITS PANEL -->

  <div
    x-show="activePanel === 'kits'"
    x-transition
    class="space-y-5">

    <div class="glass rounded-3xl p-5">

      <h2 class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        MANAGE KITS
      </h2>

      <p class="text-gray-400 mt-2">
        Inventory Management
      </p>

    </div>

    <div class="grid lg:grid-cols-2 gap-5">

      <template x-for="product in products" :key="product.id">

        <div class="glass rounded-3xl p-5 card-hover">

          <div class="flex gap-4">

            <img
              :src="product.image"
              class="h-28 w-28 object-contain rounded-2xl bg-black/20 p-2">

            <div class="flex-1">

              <h2
                class="text-2xl font-black"
                x-text="product.name">
              </h2>

              <div class="grid grid-cols-2 gap-3 mt-4">

                <input
                  type="number"
                  x-model="product.price"
                  class="glass rounded-2xl p-3 bg-transparent">

                <input
                  type="number"
                  x-model="product.stock"
                  class="glass rounded-2xl p-3 bg-transparent">

              </div>

              <button
                @click="saveProduct(product)"
                class="glow-button mt-4 bg-gradient-to-r from-cyan-500 to-emerald-500 px-5 py-3 rounded-2xl font-black uppercase tracking-wider w-full">

                SAVE CHANGES

              </button>

            </div>

          </div>

        </div>

      </template>

    </div>

  </div>

  <!-- ANALYSIS PANEL -->

  <div
    x-show="activePanel === 'analysis'"
    x-transition
    class="space-y-5">

    <div class="glass rounded-3xl p-6">

      <h2 class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent mb-6">
        ANALYTICS
      </h2>

      <div class="grid md:grid-cols-3 gap-5">

        <div class="glass rounded-3xl p-5">

          <p class="text-gray-400 text-sm mb-2">
            TOTAL PRODUCTS
          </p>

          <h2
            class="text-5xl font-black text-cyan-300"
            x-text="products.length">
          </h2>

        </div>

        <div class="glass rounded-3xl p-5">

          <p class="text-gray-400 text-sm mb-2">
            SOLD ITEMS
          </p>

          <h2
            class="text-5xl font-black text-emerald-300"
            x-text="approvedCount">
          </h2>

        </div>

        <div class="glass rounded-3xl p-5">

          <p class="text-gray-400 text-sm mb-2">
            PENDING CLAIMS
          </p>

          <h2
            class="text-5xl font-black text-yellow-300"
            x-text="pendingCount">
          </h2>

        </div>

      </div>

    </div>

  </div>

  <!-- REVENUE PANEL -->

  <div
    x-show="activePanel === 'revenue'"
    x-transition
    class="space-y-5">

    <div class="glass rounded-3xl p-6">

      <h2 class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent mb-6">
        REVENUE
      </h2>

      <div class="grid md:grid-cols-2 gap-5">

        <div class="glass rounded-3xl p-5">

          <p class="text-gray-400 text-sm mb-2">
            APPROVED REVENUE
          </p>

          <h2 class="text-5xl font-black text-pink-300">

            ₹<span x-text="revenue"></span>

          </h2>

        </div>

        <div class="glass rounded-3xl p-5">

          <p class="text-gray-400 text-sm mb-2">
            TOTAL CLAIM VALUE
          </p>

          <h2 class="text-5xl font-black text-cyan-300">

            ₹<span x-text="totalClaimValue"></span>

          </h2>

        </div>

      </div>

    </div>

  </div>

  <!-- DRAWER OVERLAY -->

  <div
    x-show="drawerOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="drawerOpen=false">
  </div>

  <!-- DRAWER -->

  <div
    x-show="drawerOpen"
    x-transition
    class="drawer fixed top-0 right-0 h-full w-80 glass z-50 p-6 border-l border-white/10">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-2xl font-bold">
        Dashboard
      </h2>

      <button
        @click="drawerOpen=false"
        class="glass px-3 py-2 rounded-xl">

        ✕

      </button>

    </div>

    <div class="space-y-3">

      <button
        @click="activePanel='kits'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300">

        📦 Manage Kits

      </button>

      <button
        @click="activePanel='approvals'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300">

        ✅ Manage Approvals

      </button>

      <button
        @click="activePanel='analysis'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300">

        📊 Analysis

      </button>

      <button
        @click="activePanel='revenue'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300">

        💰 Revenue

      </button>

    </div>

  </div>

</div>

<script>

function adminApp(){

  return {

    drawerOpen:false,

    activePanel:'approvals',

    claims:[],

    products:[],

    revenue:0,

    approvedCount:0,

    pendingCount:0,

    totalClaimValue:0,

    init(){

      const firebaseConfig = {

        apiKey:'AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg',

        authDomain:'kurozenaku-gundam-store.firebaseapp.com',

        projectId:'kurozenaku-gundam-store'

      };

      if(!firebase.apps.length){

        firebase.initializeApp(firebaseConfig);

      }

      const db = firebase.firestore();

      db.collection('claims')
      .orderBy('createdAt','desc')
      .onSnapshot(snapshot => {

        this.claims = snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

        this.calculateStats();

      });

      db.collection('products')
      .onSnapshot(snapshot => {

        this.products = snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

    },

    calculateStats(){

      this.approvedCount =
      this.claims.filter(
        c => c.status === 'approved'
      ).length;

      this.pendingCount =
      this.claims.filter(
        c => c.status === 'pending'
      ).length;

      this.revenue =
      this.claims
      .filter(c => c.status === 'approved')
      .reduce((sum,c)=> sum + (c.price || 0),0);

      this.totalClaimValue =
      this.claims
      .reduce((sum,c)=> sum + (c.price || 0),0);

    },

    async updateClaim(id,status){

      const db = firebase.firestore();

      await db.collection('claims')
      .doc(id)
      .update({

        status:status

      });

    },

    async saveProduct(product){

      const db = firebase.firestore();

      await db.collection('products')
      .doc(product.id)
      .update({

        price:Number(product.price),

        stock:Number(product.stock)

      });

    }

  }

}

</script>

</body>
</html>
