<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KUROZENAKU ADMIN</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    body{
      font-family:'Inter',sans-serif;
      background:
      radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
      color:white;
      overflow-x:hidden;
    }

    .logo-font{
      font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;
    }

    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
    }

    .drawer{
      transition:all .3s ease;
    }

    .glow{
      box-shadow:
      0 0 15px rgba(34,211,238,.25),
      0 0 35px rgba(16,185,129,.15);
    }

    .card-hover{
      transition:.25s ease;
    }

    .card-hover:hover{
      transform:translateY(-6px);
      box-shadow:
      0 0 20px rgba(34,211,238,.2),
      0 0 40px rgba(16,185,129,.15);
    }

    .tab-active{
      background:linear-gradient(to right,#06b6d4,#10b981);
      color:white;
      box-shadow:0 0 20px rgba(16,185,129,.5);
    }

    input,
    select,
    textarea{
      outline:none;
    }

  </style>

</head>

<body>

<div
  x-data="adminApp()"
  x-init="init()"
  class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->

  <div class="glass rounded-3xl p-5 flex justify-between items-center mb-6 glow">

    <div>

      <h1 class="logo-font text-3xl md:text-4xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        KUROZENAKU ADMIN
      </h1>

      <p class="text-gray-400 text-sm mt-1">
        Premium Gundam Management System
      </p>

    </div>

    <button
      @click="drawerOpen=true"
      class="glass px-5 py-3 rounded-2xl hover:bg-white/10 transition-all duration-300 hover:scale-[1.03] active:scale-95">

      ☰ Menu

    </button>

  </div>

  <!-- DRAWER OVERLAY -->

  <div
    x-show="drawerOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="drawerOpen=false">
  </div>

  <!-- DRAWER -->

  <div
    x-show="drawerOpen"
    x-transition
    class="drawer fixed top-0 right-0 h-full w-80 glass z-50 p-6 border-l border-white/10 overflow-y-auto">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-2xl font-bold">
        Dashboard
      </h2>

      <button
        @click="drawerOpen=false"
        class="glass px-3 py-2 rounded-xl hover:bg-white/10">

        ✕

      </button>

    </div>

    <div class="space-y-3">

      <button
        @click="section='kits'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300 hover:scale-[1.02] active:scale-95">

        📦 Manage Kits

      </button>

      <button
        @click="section='claims'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300 hover:scale-[1.02] active:scale-95">

        ✅ Manage Claims

      </button>

      <button
        @click="section='analysis'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300 hover:scale-[1.02] active:scale-95">

        📊 Analysis

      </button>

      <button
        @click="section='bin'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300 hover:scale-[1.02] active:scale-95">

        🗑 Claim Bin

      </button>

      <button
        onclick="window.location.href='index.html'"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300 hover:scale-[1.02] active:scale-95">

        🏠 Storefront

      </button>

    </div>

  </div>

  <!-- STATS -->

  <div class="grid grid-cols-2 lg:grid-cols-6 gap-4 mb-8">

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">TOTAL CLAIMS</p>
      <h2 class="text-3xl font-black mt-2" x-text="claims.length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">PENDING</p>
      <h2 class="text-3xl font-black mt-2 text-yellow-300" x-text="pendingClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">APPROVED</p>
      <h2 class="text-3xl font-black mt-2 text-emerald-300" x-text="approvedClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">REJECTED</p>
      <h2 class="text-3xl font-black mt-2 text-red-300" x-text="rejectedClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">REVENUE</p>
      <h2 class="text-2xl font-black mt-2 text-cyan-300">
        ₹<span x-text="revenue()"></span>
      </h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">LOW STOCK</p>
      <h2 class="text-3xl font-black mt-2 text-orange-300" x-text="lowStockCount()"></h2>
    </div>

  </div>

  <!-- MANAGE KITS -->

  <div x-show="section==='kits'">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-3xl font-black">
        📦 Manage Kits
      </h2>

      <button
        @click="showAddKit=true"
        class="bg-gradient-to-r from-cyan-500 to-emerald-500 px-5 py-3 rounded-2xl font-bold hover:brightness-125 transition-all duration-300 hover:scale-[1.03] active:scale-95 shadow-[0_0_20px_rgba(34,211,238,.35)]">

        + Add Kit

      </button>

    </div>

    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">

      <template x-for="product in products" :key="product.id">

        <div class="glass rounded-3xl p-5 glow card-hover">

          <img
            :src="product.image"
            class="h-48 w-full object-contain mb-4">

          <h2 class="text-xl font-bold" x-text="product.name"></h2>

          <p class="text-cyan-300 text-2xl font-black mt-2">
            ₹<span x-text="product.price"></span>
          </p>

          <div class="text-gray-400 mt-2">
            Stock:
            <span x-text="product.stock"></span>
          </div>

          <div class="flex gap-2 mt-4">

            <button
              @click="openEditKit(product)"
              class="flex-1 bg-gradient-to-r from-cyan-500 to-emerald-500 px-4 py-3 rounded-2xl font-bold transition-all duration-300 hover:scale-[1.03] hover:brightness-125 active:scale-95 cursor-pointer shadow-[0_0_20px_rgba(34,211,238,.25)] hover:shadow-[0_0_30px_rgba(16,185,129,.35)]">

              ✏ EDIT

            </button>

            <button
              @click="deleteKit(product.id)"
              class="flex-1 bg-gradient-to-r from-red-500 to-pink-500 px-4 py-3 rounded-2xl font-bold transition-all duration-300 hover:scale-[1.03] hover:brightness-125 active:scale-95 cursor-pointer shadow-[0_0_20px_rgba(239,68,68,.25)] hover:shadow-[0_0_30px_rgba(236,72,153,.35)]">

              DELETE

            </button>

          </div>

        </div>

      </template>

    </div>

  </div>

  <!-- MANAGE CLAIMS -->

  <div x-show="section==='claims'" class="mt-6">

    <div class="flex flex-wrap gap-3 mb-6">

      <button
        @click="claimTab='pending'"
        :class="claimTab==='pending' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl transition-all duration-300 hover:scale-[1.03]">

        Pending

      </button>

      <button
        @click="claimTab='approved'"
        :class="claimTab==='approved' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl transition-all duration-300 hover:scale-[1.03]">

        Approved

      </button>

      <button
        @click="claimTab='rejected'"
        :class="claimTab==='rejected' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl transition-all duration-300 hover:scale-[1.03]">

        Rejected

      </button>

    </div>

    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">

      <template
        x-for="claim in filteredClaims()"
        :key="claim.id">

        <div class="glass rounded-3xl p-5 glow card-hover">

          <div class="flex justify-between items-start mb-4">

            <div>

              <h2
                class="text-xl font-black"
                x-text="claim.productName">
              </h2>

              <p class="text-cyan-300 font-bold mt-1">
                ₹<span x-text="claim.price"></span>
              </p>

            </div>

            <div
              class="px-3 py-1 rounded-full text-sm font-bold"
              :class="{
                'bg-yellow-500/20 text-yellow-300':claim.status==='pending',
                'bg-emerald-500/20 text-emerald-300':claim.status==='approved',
                'bg-red-500/20 text-red-300':claim.status==='rejected'
              }">

              <span x-text="claim.status.toUpperCase()"></span>

            </div>

          </div>

          <div class="space-y-2 text-sm">

            <p>
              <span class="text-gray-400">Customer:</span>
              <span x-text="claim.customerName"></span>
            </p>

            <p>
              <span class="text-gray-400">Phone:</span>
              <span x-text="claim.phone || 'N/A'"></span>
            </p>

          </div>

          <div class="flex flex-wrap gap-2 mt-5">

            <template x-if="claim.status==='pending'">

              <div class="flex gap-2 w-full">

                <button
                  @click="changeClaimStatus(claim,'approved')"
                  class="flex-1 bg-gradient-to-r from-cyan-500 to-emerald-500 px-4 py-3 rounded-2xl font-bold transition-all duration-300 hover:scale-[1.03] hover:brightness-125 active:scale-95 cursor-pointer shadow-[0_0_20px_rgba(34,211,238,.25)] hover:shadow-[0_0_30px_rgba(16,185,129,.35)]">

                  APPROVE

                </button>

                <button
                  @click="changeClaimStatus(claim,'rejected')"
                  class="flex-1 bg-gradient-to-r from-red-500 to-pink-500 px-4 py-3 rounded-2xl font-bold transition-all duration-300 hover:scale-[1.03] hover:brightness-125 active:scale-95 cursor-pointer shadow-[0_0_20px_rgba(239,68,68,.25)] hover:shadow-[0_0_30px_rgba(236,72,153,.35)]">

                  REJECT

                </button>

              </div>

            </template>

            <template x-if="claim.status==='approved'">

              <button
                @click="changeClaimStatus(claim,'pending')"
                class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 px-4 py-3 rounded-2xl font-bold transition-all duration-300 hover:scale-[1.03] hover:brightness-125 active:scale-95 cursor-pointer shadow-[0_0_20px_rgba(234,179,8,.25)] hover:shadow-[0_0_30px_rgba(249,115,22,.35)]">

                REVERT TO PENDING

              </button>

            </template>

            <template x-if="claim.status==='rejected'">

              <div class="flex gap-2 w-full">

                <button
                  @click="changeClaimStatus(claim,'pending')"
                  class="flex-1 bg-gradient-to-r from-yellow-500 to-orange-500 px-4 py-3 rounded-2xl font-bold transition-all duration-300 hover:scale-[1.03] hover:brightness-125 active:scale-95 cursor-pointer shadow-[0_0_20px_rgba(234,179,8,.25)] hover:shadow-[0_0_30px_rgba(249,115,22,.35)]">

                  REVERT

                </button>

                <button
                  @click="moveClaimToBin(claim)"
                  class="flex-1 bg-gradient-to-r from-red-500 to-pink-500 px-4 py-3 rounded-2xl font-bold transition-all duration-300 hover:scale-[1.03] hover:brightness-125 active:scale-95 cursor-pointer shadow-[0_0_20px_rgba(239,68,68,.25)] hover:shadow-[0_0_30px_rgba(236,72,153,.35)]">

                  DELETE

                </button>

              </div>

            </template>

          </div>

        </div>

      </template>

    </div>

  </div>

</div>

<script>

function adminApp(){

  return {

    drawerOpen:false,
    section:'kits',
    claimTab:'pending',

    claims:[],
    deletedClaims:[],
    products:[],

    db:null,

    showAddKit:false,

    init(){

      const firebaseConfig = {

        apiKey:'AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg',
        authDomain:'kurozenaku-gundam-store.firebaseapp.com',
        projectId:'kurozenaku-gundam-store'

      };

      if(!firebase.apps.length){

        firebase.initializeApp(firebaseConfig);

      }

      this.db = firebase.firestore();

      this.db
      .collection('products')
      .onSnapshot(snapshot => {

        this.products =
        snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

      this.db
      .collection('claims')
      .onSnapshot(snapshot => {

        this.claims =
        snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

      this.db
      .collection('deletedClaims')
      .onSnapshot(snapshot => {

        this.deletedClaims =
        snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

    },

    filteredClaims(){

      return this.claims.filter(
        c => c.status === this.claimTab
      );

    },

    pendingClaims(){

      return this.claims.filter(
        c => c.status === 'pending'
      );

    },

    approvedClaims(){

      return this.claims.filter(
        c => c.status === 'approved'
      );

    },

    rejectedClaims(){

      return this.claims.filter(
        c => c.status === 'rejected'
      );

    },

    revenue(){

      return this.approvedClaims()
      .reduce((sum,c)=>
        sum + Number(c.price || 0)
      ,0);

    },

    lowStockCount(){

      return this.products.filter(
        p => Number(p.stock || 0) <= 1
      ).length;

    },

    openEditKit(product){

      alert('Edit modal retained');

    },

    async deleteKit(id){

      try{

        const confirmDelete =
        confirm('Delete this kit?');

        if(!confirmDelete){
          return;
        }

        await this.db
        .collection('products')
        .doc(id)
        .delete();

      }

      catch(error){

        console.error(error);

        alert(
          error.message ||
          'Failed to delete kit'
        );

      }

    },

    async changeClaimStatus(claim,newStatus){

      try{

        const claimRef =
        this.db.collection('claims').doc(claim.id);

        await claimRef.update({

          status:newStatus,

          updatedAt:
          firebase.firestore.FieldValue.serverTimestamp()

        });

      }

      catch(error){

        console.error(error);

        alert(error.message);

      }

    },

    async moveClaimToBin(claim){

      try{

        if(!claim?.id){

          alert('Invalid claim');
          return;

        }

        const confirmDelete =
        confirm(
          'Move this rejected claim to Claim Bin?'
        );

        if(!confirmDelete){
          return;
        }

        const claimRef =
        this.db.collection('claims').doc(claim.id);

        const deletedRef =
        this.db.collection('deletedClaims').doc(claim.id);

        const existingClaim =
        await claimRef.get();

        if(!existingClaim.exists){

          alert('Claim already removed');
          return;

        }

        await deletedRef.set({

          ...existingClaim.data(),

          deletedAt:
          firebase.firestore.FieldValue.serverTimestamp()

        });

        await claimRef.delete();

        this.claims =
        this.claims.filter(
          c => c.id !== claim.id
        );

      }

      catch(error){

        console.error(
          'DELETE CLAIM ERROR:',
          error
        );

        alert(
          error.message ||
          'Failed to move claim to bin'
        );

      }

    }

  }

}

</script>

</body>
</html>
