<!-- FULL UPDATED admin.html -->

<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KUROZENAKU ADMIN</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    body{
      font-family:'Inter',sans-serif;
      background:
      radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
      color:white;
      overflow-x:hidden;
    }

    .logo-font{
      font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;
    }

    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
    }

    .drawer{
      transition:all .3s ease;
    }

    .glow{
      box-shadow:
      0 0 15px rgba(34,211,238,.25),
      0 0 35px rgba(16,185,129,.15);
    }

    .card-hover{
      transition:.25s ease;
    }

    .card-hover:hover{
      transform:translateY(-6px);
      box-shadow:
      0 0 20px rgba(34,211,238,.2),
      0 0 40px rgba(16,185,129,.15);
    }

    .tab-active{
      background:linear-gradient(to right,#06b6d4,#10b981);
      color:white;
      box-shadow:
      0 0 20px rgba(16,185,129,.5);
    }

    input, select{
      outline:none;
    }

  </style>

</head>

<body>

<div
  x-data="adminApp()"
  x-init="init()"
  class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->

  <div class="glass rounded-3xl p-5 flex justify-between items-center mb-6 glow">

    <div>

      <h1 class="logo-font text-3xl md:text-4xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        KUROZENAKU ADMIN
      </h1>

      <p class="text-gray-400 text-sm mt-1">
        Realtime Gundam Management System
      </p>

    </div>

    <button
      @click="drawerOpen=true"
      class="glass px-5 py-3 rounded-2xl hover:bg-white/10 transition-all duration-300">

      ☰ Menu

    </button>

  </div>

  <!-- DRAWER OVERLAY -->

  <div
    x-show="drawerOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="drawerOpen=false">
  </div>

  <!-- DRAWER -->

  <div
    x-show="drawerOpen"
    x-transition
    class="drawer fixed top-0 right-0 h-full w-80 glass z-50 p-6 border-l border-white/10 overflow-y-auto">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-2xl font-bold">
        Dashboard
      </h2>

      <button
        @click="drawerOpen=false"
        class="glass px-3 py-2 rounded-xl hover:bg-white/10">

        ✕

      </button>

    </div>

    <div class="space-y-3">

      <button
        @click="section='kits'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        📦 Manage Kits

      </button>

      <button
        @click="section='claims'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        ✅ Manage Approvals

      </button>

      <button
        @click="section='analysis'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        📊 Analysis

      </button>

      <button
        @click="section='revenue'; drawerOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        💰 Revenue

      </button>

      <button
        onclick="window.location.href='index.html'"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        🏠 Storefront

      </button>

    </div>

  </div>

  <!-- TOP ANALYTICS -->

  <div class="grid grid-cols-2 lg:grid-cols-6 gap-4 mb-8">

    <div class="glass rounded-3xl p-5 glow card-hover">
      <p class="text-gray-400 text-sm">TOTAL CLAIMS</p>
      <h2 class="text-3xl font-black mt-2" x-text="claims.length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow card-hover">
      <p class="text-gray-400 text-sm">PENDING</p>
      <h2 class="text-3xl font-black mt-2 text-yellow-300" x-text="pendingClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow card-hover">
      <p class="text-gray-400 text-sm">APPROVED</p>
      <h2 class="text-3xl font-black mt-2 text-emerald-300" x-text="approvedClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow card-hover">
      <p class="text-gray-400 text-sm">REJECTED</p>
      <h2 class="text-3xl font-black mt-2 text-red-300" x-text="rejectedClaims().length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow card-hover">
      <p class="text-gray-400 text-sm">REVENUE</p>
      <h2 class="text-2xl font-black mt-2 text-cyan-300">
        ₹<span x-text="revenue()"></span>
      </h2>
    </div>

    <div class="glass rounded-3xl p-5 glow card-hover">
      <p class="text-gray-400 text-sm">LOW STOCK</p>
      <h2 class="text-3xl font-black mt-2 text-orange-300" x-text="lowStockCount()"></h2>
    </div>

  </div>

  <!-- =========================================
       MANAGE KITS PANEL
  ========================================== -->

  <div x-show="section==='kits'">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-3xl font-black">
        📦 Manage Kits
      </h2>

      <button
        @click="showAddKit=true"
        class="bg-gradient-to-r from-cyan-500 to-emerald-500 px-5 py-3 rounded-2xl font-bold hover:brightness-125">

        + Add Kit

      </button>

    </div>

    <!-- ADD KIT -->

    <div
      x-show="showAddKit"
      class="glass rounded-3xl p-5 mb-6 glow">

      <div class="grid md:grid-cols-2 gap-4">

        <input
          x-model="newKit.name"
          placeholder="Kit Name"
          class="glass rounded-2xl p-4 bg-transparent">

        <input
          x-model="newKit.price"
          placeholder="Price"
          type="number"
          class="glass rounded-2xl p-4 bg-transparent">

        <input
          x-model="newKit.stock"
          placeholder="Stock"
          type="number"
          class="glass rounded-2xl p-4 bg-transparent">

        <select
          x-model="newKit.category"
          class="glass rounded-2xl p-4 bg-[#08111f]">

          <option>HG</option>
          <option>MG</option>
          <option>RG</option>
          <option>PG</option>
          <option>SD</option>

        </select>

        <input
          x-model="newKit.image"
          placeholder="Image URL"
          class="glass rounded-2xl p-4 bg-transparent md:col-span-2">

      </div>

      <div class="flex gap-3 mt-5">

        <button
          @click="addKit()"
          class="bg-gradient-to-r from-cyan-500 to-emerald-500 px-6 py-3 rounded-2xl font-bold">

          SAVE KIT

        </button>

        <button
          @click="showAddKit=false"
          class="glass px-6 py-3 rounded-2xl">

          CANCEL

        </button>

      </div>

    </div>

    <!-- KIT GRID -->

    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">

      <template x-for="product in products" :key="product.id">

        <div class="glass rounded-3xl p-5 glow card-hover">

          <img
            :src="product.image"
            class="h-48 w-full object-contain mb-4">

          <h2
            class="text-xl font-bold"
            x-text="product.name">
          </h2>

          <p class="text-cyan-300 text-2xl font-black mt-2">
            ₹<span x-text="product.price"></span>
          </p>

          <div class="flex justify-between items-center mt-4">

            <div class="text-gray-400">

              Stock:
              <span x-text="product.stock"></span>

            </div>

            <button
              @click="deleteKit(product.id)"
              class="bg-gradient-to-r from-red-500 to-pink-500 px-4 py-2 rounded-xl font-bold">

              DELETE

            </button>

          </div>

        </div>

      </template>

    </div>

  </div>

  <!-- =========================================
       CLAIM PANEL
  ========================================== -->

  <div x-show="section==='claims'">

    <div class="flex flex-wrap gap-3 mb-6 mt-6">

      <button
        @click="claimTab='all'"
        :class="claimTab==='all' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl">

        ALL

      </button>

      <button
        @click="claimTab='pending'"
        :class="claimTab==='pending' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl">

        PENDING

      </button>

      <button
        @click="claimTab='approved'"
        :class="claimTab==='approved' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl">

        APPROVED

      </button>

      <button
        @click="claimTab='rejected'"
        :class="claimTab==='rejected' ? 'tab-active' : ''"
        class="glass px-5 py-3 rounded-2xl">

        REJECTED

      </button>

    </div>

    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">

      <template x-for="claim in filteredClaims()" :key="claim.id">

        <div class="glass rounded-3xl p-5 glow card-hover">

          <div class="flex justify-between items-start mb-4">

            <div>

              <h2
                class="text-xl font-bold"
                x-text="claim.productName">
              </h2>

              <p class="text-cyan-300 text-2xl font-black mt-2">
                ₹<span x-text="claim.price"></span>
              </p>

            </div>

            <div>

              <span
                x-show="claim.status==='pending'"
                class="px-3 py-1 rounded-xl bg-yellow-500/20 text-yellow-300 text-sm">

                Pending

              </span>

              <span
                x-show="claim.status==='approved'"
                class="px-3 py-1 rounded-xl bg-emerald-500/20 text-emerald-300 text-sm">

                Approved

              </span>

              <span
                x-show="claim.status==='rejected'"
                class="px-3 py-1 rounded-xl bg-red-500/20 text-red-300 text-sm">

                Rejected

              </span>

            </div>

          </div>

          <div
            x-show="claim.status==='pending'"
            class="flex gap-3 mt-5">

            <button
              @click="approveClaim(claim)"
              class="flex-1 bg-gradient-to-r from-emerald-500 to-cyan-500 py-3 rounded-2xl font-bold">

              ✔ APPROVE

            </button>

            <button
              @click="rejectClaim(claim)"
              class="flex-1 bg-gradient-to-r from-red-500 to-pink-500 py-3 rounded-2xl font-bold">

              ✖ REJECT

            </button>

          </div>

        </div>

      </template>

    </div>

  </div>

  <!-- =========================================
       ANALYSIS PANEL
  ========================================== -->

  <div
    x-show="section==='analysis'"
    class="mt-6">

    <h2 class="text-3xl font-black mb-6">
      📊 Analysis
    </h2>

    <div class="grid md:grid-cols-2 xl:grid-cols-4 gap-5">

      <div class="glass rounded-3xl p-6 glow">
        <p class="text-gray-400">Most Claimed</p>
        <h2 class="text-2xl font-black mt-3" x-text="topProduct()"></h2>
      </div>

      <div class="glass rounded-3xl p-6 glow">
        <p class="text-gray-400">Total Products</p>
        <h2 class="text-2xl font-black mt-3" x-text="products.length"></h2>
      </div>

      <div class="glass rounded-3xl p-6 glow">
        <p class="text-gray-400">Out Of Stock</p>
        <h2 class="text-2xl font-black mt-3" x-text="outOfStockCount()"></h2>
      </div>

      <div class="glass rounded-3xl p-6 glow">
        <p class="text-gray-400">Inventory Units</p>
        <h2 class="text-2xl font-black mt-3" x-text="inventoryCount()"></h2>
      </div>

    </div>

  </div>

  <!-- =========================================
       REVENUE PANEL
  ========================================== -->

  <div
    x-show="section==='revenue'"
    class="mt-6">

    <h2 class="text-3xl font-black mb-6">
      💰 Revenue
    </h2>

    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">

      <div class="glass rounded-3xl p-6 glow">

        <p class="text-gray-400">
          Approved Revenue
        </p>

        <h2 class="text-4xl font-black text-emerald-300 mt-4">
          ₹<span x-text="revenue()"></span>
        </h2>

      </div>

      <div class="glass rounded-3xl p-6 glow">

        <p class="text-gray-400">
          Pending Revenue
        </p>

        <h2 class="text-4xl font-black text-yellow-300 mt-4">
          ₹<span x-text="pendingRevenue()"></span>
        </h2>

      </div>

      <div class="glass rounded-3xl p-6 glow">

        <p class="text-gray-400">
          Rejected Value
        </p>

        <h2 class="text-4xl font-black text-red-300 mt-4">
          ₹<span x-text="rejectedRevenue()"></span>
        </h2>

      </div>

    </div>

  </div>

</div>

<script>

function adminApp(){

  return {

    drawerOpen:false,

    section:'kits',

    claimTab:'all',

    claims:[],
    products:[],

    db:null,

    showAddKit:false,

    newKit:{
      name:'',
      price:'',
      stock:'',
      category:'HG',
      image:''
    },

    init(){

      const firebaseConfig = {

        apiKey:'AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg',

        authDomain:'kurozenaku-gundam-store.firebaseapp.com',

        projectId:'kurozenaku-gundam-store'

      };

      if(!firebase.apps.length){

        firebase.initializeApp(firebaseConfig);

      }

      this.db = firebase.firestore();

      /* CLAIMS REALTIME */

      this.db.collection('claims')
      .orderBy('createdAt','desc')
      .onSnapshot(snapshot => {

        this.claims = snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

      /* PRODUCTS REALTIME */

      this.db.collection('products')
      .onSnapshot(snapshot => {

        this.products = snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

    },

    filteredClaims(){

      if(this.claimTab === 'all'){

        return this.claims;

      }

      return this.claims.filter(
        c => c.status === this.claimTab
      );

    },

    pendingClaims(){

      return this.claims.filter(
        c => c.status === 'pending'
      );

    },

    approvedClaims(){

      return this.claims.filter(
        c => c.status === 'approved'
      );

    },

    rejectedClaims(){

      return this.claims.filter(
        c => c.status === 'rejected'
      );

    },

    revenue(){

      return this.approvedClaims()
      .reduce((sum,c)=>sum+c.price,0);

    },

    pendingRevenue(){

      return this.pendingClaims()
      .reduce((sum,c)=>sum+c.price,0);

    },

    rejectedRevenue(){

      return this.rejectedClaims()
      .reduce((sum,c)=>sum+c.price,0);

    },

    lowStockCount(){

      return this.products.filter(
        p => p.stock <= 1
      ).length;

    },

    inventoryCount(){

      return this.products.reduce(
        (sum,p)=>sum+p.stock,
        0
      );

    },

    outOfStockCount(){

      return this.products.filter(
        p => p.stock <= 0
      ).length;

    },

    topProduct(){

      if(this.claims.length === 0){

        return 'No Data';

      }

      const counts = {};

      this.claims.forEach(c => {

        counts[c.productName] =
        (counts[c.productName] || 0) + 1;

      });

      return Object.keys(counts)
      .reduce((a,b)=>
        counts[a] > counts[b] ? a : b
      );

    },

    async approveClaim(claim){

      await this.db.collection('claims')
      .doc(claim.id)
      .update({

        status:'approved'

      });

    },

    async rejectClaim(claim){

      await this.db.collection('claims')
      .doc(claim.id)
      .update({

        status:'rejected'

      });

      const productRef =
      this.db.collection('products')
      .doc(claim.productId);

      const productDoc =
      await productRef.get();

      if(productDoc.exists){

        await productRef.update({

          stock:
          (productDoc.data().stock || 0) + 1

        });

      }

    },

    async addKit(){

      if(
        !this.newKit.name ||
        !this.newKit.price ||
        !this.newKit.stock ||
        !this.newKit.image
      ){

        return alert('Fill all fields');

      }

      await this.db.collection('products')
      .add({

        name:this.newKit.name,
        price:Number(this.newKit.price),
        stock:Number(this.newKit.stock),
        category:this.newKit.category,
        image:this.newKit.image

      });

      this.newKit = {

        name:'',
        price:'',
        stock:'',
        category:'HG',
        image:''

      };

      this.showAddKit=false;

    },

    async deleteKit(id){

      if(!confirm('Delete this kit?')) return;

      await this.db.collection('products')
      .doc(id)
      .delete();

    }

  }

}

</script>

</body>
</html>
