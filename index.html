<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kurozenaku Store</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>

    body{
      font-family:'Inter',sans-serif;
      background:
      radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
      color:white;
      overflow-x:hidden;
    }

    .logo-font{
      font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;
    }

    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
    }

    .product-card{
      transition:.25s ease;
    }

    .product-card:hover{
      transform:translateY(-8px);
      box-shadow:0 0 40px rgba(0,255,255,.18);
    }

    @keyframes pulseGlow{

      0%{
        box-shadow:0 0 10px rgba(20,184,166,.4);
      }

      50%{
        box-shadow:0 0 35px rgba(20,184,166,1);
      }

      100%{
        box-shadow:0 0 10px rgba(20,184,166,.4);
      }

    }

    .glow-button{
      animation:pulseGlow 2s infinite ease-in-out;
    }

    .glow-button:hover{
      filter:brightness(1.2);
      transform:translateY(-2px) scale(1.03);
    }

    .drawer{
      transition:transform .3s ease;
    }

    .admin-glow{
      box-shadow:
      0 0 15px rgba(34,211,238,.4),
      0 0 30px rgba(16,185,129,.3);
    }

  </style>
</head>

<body>

<div
  x-data="app()"
  x-init="init()"
  class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->

  <div class="glass rounded-3xl p-5 flex justify-between items-center mb-6 shadow-2xl">

    <div>

      <h1 class="logo-font text-3xl md:text-4xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        KUROZENAKU
      </h1>

      <p class="text-gray-400 text-sm mt-1">
        Premium Gundam Catalog
      </p>

    </div>

    <div class="flex gap-3 items-center">

      <!-- ADMIN BUTTON -->

      <button
        @click="openAdminPrompt()"
        class="glass admin-glow px-5 py-3 rounded-2xl hover:bg-white/10 active:scale-95 transition-all duration-300">

        ⚙ Admin

      </button>

      <!-- MENU BUTTON -->

      <button
        @click="menuOpen = true"
        class="glass px-5 py-3 rounded-2xl hover:bg-white/10 active:scale-95 transition-all duration-300">

        ☰ Menu

      </button>

    </div>

  </div>

  <!-- SEARCH -->

  <div class="glass rounded-3xl p-3 flex gap-3 mb-8 shadow-xl">

    <button
      @click="filterOpen = true"
      class="glass px-5 py-3 rounded-2xl hover:bg-white/10 active:scale-95 transition-all duration-300">

      ☰

    </button>

    <input
      x-model="search"
      placeholder="Search Gundam kits..."
      class="flex-1 bg-transparent outline-none text-white placeholder:text-gray-400 px-2">

  </div>

  <!-- FILTER OVERLAY -->

  <div
    x-show="filterOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="filterOpen = false">
  </div>

  <!-- FILTER DRAWER -->

  <div
    x-show="filterOpen"
    x-transition
    class="drawer fixed top-0 left-0 h-full w-72 glass z-50 p-6 border-r border-white/10">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-2xl font-bold">
        Categories
      </h2>

      <button
        @click="filterOpen=false"
        class="glass px-3 py-2 rounded-xl hover:bg-white/10 transition">

        ✕

      </button>

    </div>

    <template x-for="c in ['ALL','HG','MG','RG','PG','SD']" :key="c">

      <button
        @click="category=c; filterOpen=false"
        class="w-full text-left glass p-4 rounded-2xl mb-3 hover:bg-white/10 active:scale-95 transition-all duration-300">

        <span x-text="c"></span>

      </button>

    </template>

  </div>

  <!-- MENU OVERLAY -->

  <div
    x-show="menuOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="menuOpen=false">
  </div>

  <!-- MENU DRAWER -->

  <div
    x-show="menuOpen"
    x-transition
    class="drawer fixed top-0 right-0 h-full w-80 glass z-50 p-6 border-l border-white/10">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-2xl font-bold">
        Menu
      </h2>

      <button
        @click="menuOpen=false"
        class="glass px-3 py-2 rounded-xl hover:bg-white/10 transition-all duration-300">

        ✕

      </button>

    </div>

    <div class="space-y-3">

      <button class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300">
        🏠 Home
      </button>

      <button class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300">
        📦 Claims
      </button>

      <button class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10 transition-all duration-300">
        ⭐ Wishlist
      </button>

    </div>

  </div>

  <!-- FIRESTORE ERROR -->

  <div
    x-show="firestoreError"
    class="glass border border-red-500/40 rounded-2xl p-4 mb-6 text-red-300">

    ⚠ Firestore connection failed. Showing local demo products.

  </div>

  <!-- PRODUCTS -->

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">

    <template x-for="p in filteredProducts()" :key="p.id">

      <div class="product-card glass rounded-3xl p-4 shadow-2xl">

        <div class="bg-black/20 rounded-2xl overflow-hidden mb-4">

          <img
            :src="p.image"
            class="h-44 w-full object-contain p-4">

        </div>

        <h2
          class="font-bold text-lg mb-2"
          x-text="p.name">
        </h2>

        <div class="flex justify-between items-center mb-3">

          <p class="text-cyan-300 text-2xl font-black">

            ₹<span x-text="p.price"></span>

          </p>

          <div class="text-xs text-gray-400">

            <span
              x-show="p.stock > 1"
              x-text="p.stock + ' left'">
            </span>

            <span x-show="p.stock === 1">
              Only 1 left
            </span>

            <span x-show="p.stock <= 0">
              Sold Out
            </span>

          </div>

        </div>

        <button
          @click="claimProduct(p)"
          :disabled="pending[p.id] || p.stock <= 0"
          class="glow-button relative bg-gradient-to-r from-cyan-500 to-emerald-500 px-6 py-4 rounded-2xl text-white font-black uppercase tracking-wider shadow-[0_0_15px_rgba(20,184,166,0.5)] transition-all duration-300 ease-in-out hover:shadow-[0_0_35px_rgba(20,184,166,1)] hover:brightness-125 hover:scale-105 active:scale-95 w-full text-lg cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">

          <span
            class="text-white text-xl font-black drop-shadow-[0_0_25px_rgba(255,255,255,1)] uppercase tracking-[0.2em]"
            x-text="pending[p.id] ? '⏳ CLAIMING...' : (p.stock <= 0 ? 'RESERVED' : '⚡ CLAIM')">
          </span>

        </button>

      </div>

    </template>

  </div>

</div>

<script>

function app(){

  return {

    menuOpen:false,
    filterOpen:false,

    search:'',
    category:'ALL',

    products:[],
    pending:{},

    firestoreError:false,

    adminPasscode:'KZ2026',

    demoProducts:[

      {
        id:'1',
        name:'RG Hi-Nu Gundam',
        price:4200,
        stock:3,
        image:'https://i.imgur.com/mh2Z5KX.png',
        category:'RG'
      },

      {
        id:'2',
        name:'MG Barbatos',
        price:5200,
        stock:1,
        image:'https://i.imgur.com/Y4X8FhB.png',
        category:'MG'
      },

      {
        id:'3',
        name:'HG Aerial',
        price:1800,
        stock:5,
        image:'https://i.imgur.com/1v7QK8b.png',
        category:'HG'
      },

      {
        id:'4',
        name:'PG Unicorn',
        price:18000,
        stock:0,
        image:'https://i.imgur.com/xhQ7Y6F.png',
        category:'PG'
      }

    ],

    init(){

      try{

        const firebaseConfig = {

          apiKey:'AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg',

          authDomain:'kurozenaku-gundam-store.firebaseapp.com',

          projectId:'kurozenaku-gundam-store'

        };

        if(!firebase.apps.length){

          firebase.initializeApp(firebaseConfig);

        }

        const db = firebase.firestore();

        db.collection('products').onSnapshot(

          (snapshot) => {

            this.firestoreError = false;

            this.products = snapshot.docs.map(doc => ({

              id:doc.id,
              ...doc.data()

            }));

            if(this.products.length === 0){

              this.products = this.demoProducts;

            }

          },

          (error) => {

            console.error('FIRESTORE ERROR:', error);

            this.firestoreError = true;

            this.products = this.demoProducts;

          }

        );

      } catch(error){

        console.error('INIT ERROR:', error);

        this.firestoreError = true;

        this.products = this.demoProducts;

      }

    },

    filteredProducts(){

      return this.products.filter(p =>

        (p.name || '')
        .toLowerCase()
        .includes(this.search.toLowerCase())

        &&

        (this.category === 'ALL' || p.category === this.category)

      );

    },

    openAdminPrompt(){

      const passcode = prompt('Enter Admin Passcode');

      if(!passcode) return;

      if(passcode === this.adminPasscode){

        window.location.href = 'admin.html';

      } else {

        alert('Invalid Passcode');

      }

    },

    async claimProduct(p){

      if(p.stock <= 0 || this.pending[p.id]) return;

      this.pending[p.id] = true;

      try{

        p.stock--;

        const msg =
        `🛒 Claim\n${p.name}\nPrice: ₹${p.price}`;

        const phone = '919359760115';

        setTimeout(() => {

          window.open(

            `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`

          );

        },300);

        try{

          const db = firebase.firestore();

          await db.collection('claims').add({

            productId:p.id,
            productName:p.name,
            price:p.price,
            createdAt:new Date(),
            status:'pending'

          });

          await db.collection('products').doc(p.id).update({

            stock:p.stock

          });

        } catch(syncError){

          console.error('CLAIM ERROR:', syncError);

        }

      } catch(error){

        console.error('CLAIM ERROR:', error);

      }

      this.pending[p.id] = false;

    }

  }

}

</script>

</body>
</html>
