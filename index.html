<!DOCTYPE html>
<html>
<head>
<title>Kurozenaku Store</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gradient-to-b from-black via-gray-900 to-black text-white min-h-screen">

<div x-data="app()" x-init="init()" class="p-6 max-w-7xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
<h1 class="text-3xl font-bold">KUROZENAKU</h1>

<button @click="menuOpen = true"
class="bg-white/10 px-3 py-2 rounded hover:bg-white/20 active:scale-95 transition">
☰ Menu
</button>
</div>

<!-- SEARCH + FILTER -->
<div class="flex gap-2 mb-4">
<button @click="filterOpen = true"
class="bg-white/10 px-3 py-2 rounded hover:bg-white/20 active:scale-95 transition">
☰
</button>

<input x-model="search" placeholder="Search Gundam kits..."
class="flex-1 p-2 text-black rounded"/>
</div>

<!-- FILTER DRAWER -->
<div x-show="filterOpen" class="fixed inset-0 bg-black/60" @click="filterOpen=false"></div>

<div x-show="filterOpen"
class="fixed top-0 left-0 h-full w-64 bg-gray-900 p-4">

<h2 class="mb-4">Category</h2>

<template x-for="c in ['ALL','HG','MG','RG','PG','SD']">
<button @click="category=c; filterOpen=false"
class="block w-full mb-2 bg-white/10 p-2 rounded hover:bg-white/20">
<span x-text="c"></span>
</button>
</template>

</div>

<!-- MENU DRAWER -->
<div x-show="menuOpen" class="fixed inset-0 bg-black/60" @click="menuOpen=false"></div>

<div x-show="menuOpen"
class="fixed top-0 right-0 h-full w-72 bg-gray-900 p-5">

<button @click="menuOpen=false"
class="mb-4 bg-white/10 px-3 py-1 rounded">Close</button>

<p>Menu</p>

</div>

<!-- PRODUCTS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">

<template x-for="p in filteredProducts()" :key="p.id">
<div class="bg-white/10 p-3 rounded">

<img :src="p.image" class="h-40 w-full object-contain">

<h2 x-text="p.name"></h2>
<p>₹<span x-text="p.price"></span></p>

<p class="text-xs">
<span x-show="p.stock > 1" x-text="p.stock + ' left'"></span>
<span x-show="p.stock === 1">Only 1 left</span>
<span x-show="p.stock === 0">Sold Out</span>
</p>

<!-- BUTTON -->
<button 
@click="claimProduct(p)" 
:disabled="p.stock===0 || p.reserved"
class="w-full mt-2 py-2 rounded bg-green-500 hover:bg-green-400 active:scale-95 transition disabled:opacity-50">

<span x-show="!p.reserved">Claim</span>
<span x-show="p.reserved">Reserved</span>

</button>

</div>
</template>

</div>

</div>

<script>
function app(){
return {

menuOpen:false,
filterOpen:false,

products:[],
search:'',
category:'ALL',

init(){

firebase.initializeApp({
apiKey:"AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg",
authDomain:"kurozenaku-gundam-store.firebaseapp.com",
projectId:"kurozenaku-gundam-store"
});

firebase.firestore().collection("products").onSnapshot(s=>{
this.products = s.docs.map(d=>({
id:d.id,
...d.data(),
reserved:false
}));
});

},

filteredProducts(){
return this.products.filter(p=>
(p.name||'').toLowerCase().includes(this.search.toLowerCase()) &&
(this.category==='ALL'||p.category===this.category)
);
},

async claimProduct(p){

if(p.stock <= 0 || p.reserved) return;

// ✅ instant UI feedback
p.reserved = true;

try{

// create claim
const claimRef = await firebase.firestore().collection("claims").add({
productId: p.id,
productName: p.name,
price: p.price,
status: "PENDING",
createdAt: new Date()
});

// reduce stock
await firebase.firestore().collection("products").doc(p.id).update({
stock: p.stock - 1
});

// WhatsApp open
setTimeout(()=>{
const phone = "91XXXXXXXXXX"; // 🔥 replace

const msg = `🛒 Claim\n${p.name}\nID:${claimRef.id}`;
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
},400);

}catch(e){

console.error("CLAIM FAILED:", e);

// ❌ rollback UI if failed
p.reserved = false;

// show minimal feedback (not ugly alert)
console.log("Firestore blocked write → fix rules");

}

}

}
}
</script>

</body>
</html>
