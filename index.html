<!DOCTYPE html>
<html>
<head>
  <title>Kurozenaku Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 5px rgba(20, 184, 166, 0.4); }
      50% { box-shadow: 0 0 20px rgba(20, 184, 166, 0.7); }
      100% { box-shadow: 0 0 5px rgba(20, 184, 166, 0.4); }
    }

    .glow-button {
      animation: pulse-glow 2s infinite ease-in-out;
    }

    .glow-button:hover,
    .glow-button:active {
      filter: brightness(1.4);
      box-shadow: 0 0 30px rgba(52, 211, 153, 1) !important;
      transform: translateY(-2px);
    }
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top,#1e293b 0%,#020617 40%,#000000 100%);
    }

    .logo-font {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: .12em;
    }

    .glass {
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.08);
    }

    .product-card {
      position: relative;
      overflow: hidden;
      transition: .3s ease;
    }

    .product-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow:
        0 0 30px rgba(59,130,246,.18),
        0 0 50px rgba(16,185,129,.08);
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: -120%;
      left: -40%;
      width: 70%;
      height: 300%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
      );
      transform: rotate(25deg);
      transition: .8s;
    }

    .product-card:hover::before {
      left: 120%;
    }

    .neon-button {
      position: relative;
      overflow: hidden;
    }

    .neon-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.2),
        transparent
      );
      transform: translateX(-120%);
      transition: .6s;
    }

    .neon-button:hover::before {
      transform: translateX(120%);
    }

    .grid-light {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>

<body class="text-white min-h-screen">

<div class="grid-light"></div>

<div x-data="app()" x-init="init()" class="p-4 md:p-6 max-w-7xl mx-auto">

  <!-- HEADER -->
  <div class="glass rounded-3xl p-5 md:p-6 mb-6 flex justify-between items-center shadow-2xl">

    <div>
      <h1 class="logo-font text-3xl md:text-4xl font-black bg-gradient-to-r from-cyan-400 via-white to-emerald-400 bg-clip-text text-transparent">
        KUROZENAKU
      </h1>

      <p class="text-gray-400 text-sm mt-1">
        Premium Gundam Catalog
      </p>
    </div>

    <button
      @click="menuOpen=true"
      class="neon-button px-5 py-3 rounded-2xl glass hover:bg-white/10 hover:-translate-y-1 active:scale-95 transition-all duration-300">
      ☰ Menu
    </button>

  </div>

  <!-- SEARCH -->
  <div class="glass rounded-3xl p-3 flex gap-3 mb-8 shadow-xl">

    <button
      @click="filterOpen=true"
      class="neon-button px-5 py-3 rounded-2xl glass hover:bg-white/10 hover:-translate-y-1 active:scale-95 transition-all duration-300">
      ☰
    </button>

    <input
      x-model="search"
      placeholder="Search Gundam kits..."
      class="flex-1 px-2 py-2 outline-none text-white bg-transparent placeholder:text-gray-400">

  </div>

  <!-- FILTER -->
  <div x-show="filterOpen" x-transition.opacity.opacity class="fixed inset-0 bg-black/70 z-40" @click="filterOpen=false"></div>

  <div
    x-show="filterOpen"
    x-transition.opacity
    class="fixed top-0 left-0 h-full w-72 glass z-50 border-r border-white/10 p-6">

    <h2 class="text-2xl font-bold mb-6">Categories</h2>

    <template x-for="c in ['ALL','HG','MG','RG','PG','SD']">
      <button
        @click="category=c; filterOpen=false"
        class="w-full text-left mb-3 glass p-4 rounded-2xl hover:bg-white/10 hover:translate-x-1 transition-all duration-300">
        <span x-text="c"></span>
      </button>
    </template>

  </div>

  <!-- MENU -->
  <div x-show="menuOpen" x-transition.opacity.opacity class="fixed inset-0 bg-black/70 z-40" @click="menuOpen=false"></div>

  <div
    x-show="menuOpen"
    x-transition.opacity
    class="fixed top-0 right-0 h-full w-80 glass z-50 border-l border-white/10 p-6">

    <button
      @click="menuOpen=false"
      class="glass px-4 py-2 rounded-2xl hover:bg-white/10 transition-all mb-6">
      Close
    </button>

    <div class="space-y-3">
      <div class="glass rounded-2xl p-4">🏠 Home</div>
      <div class="glass rounded-2xl p-4">📦 Claims</div>
      <div class="glass rounded-2xl p-4">⭐ Wishlist</div>
    </div>

  </div>

  <!-- PRODUCTS -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">

    <template x-for="p in filteredProducts()" :key="p.id">

      <div class="product-card glass rounded-3xl p-4 md:p-5 shadow-2xl">

        <div class="relative rounded-2xl overflow-hidden bg-black/20 mb-4">

          <img :src="p.image" class="h-44 md:h-52 w-full object-contain p-4">

          <div class="absolute top-3 right-3">
            <div
              x-show="p.stock > 0"
              class="px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/20 border border-emerald-400/20 text-emerald-300">
              In Stock
            </div>
          </div>

        </div>

        <h2 x-text="p.name" class="font-semibold text-lg leading-tight mb-2"></h2>

        <div class="flex justify-between items-center mb-3">
          <p class="text-2xl font-black text-cyan-300">
            ₹<span x-text="p.price"></span>
          </p>

          <p class="text-xs text-gray-400">
            <span x-show="p.stock > 1" x-text="p.stock + ' left'"></span>
            <span x-show="p.stock === 1">Only 1 left</span>
          </p>
        </div>

        <p x-show="p.reserved" class="text-yellow-300 text-sm mb-3 animate-pulse">
          ⚡ Reserved
        </p>

        <button
          @click="claimProduct(p)"
          :disabled="pending[p.id]"
          class="glow-button relative bg-gradient-to-r from-cyan-500 to-emerald-500 px-6 py-4 rounded-2xl text-white font-black uppercase tracking-wider shadow-[0_0_15px_rgba(20,184,166,0.5)] transition-all duration-300 ease-in-out hover:shadow-[0_0_25px_rgba(20,184,166,0.8)] hover:brightness-125 hover:scale-105 active:scale-95 w-full text-lg cursor-pointer disabled:opacity-60 disabled:shadow-none">

          <span class="text-white text-xl font-black drop-shadow-[0_0_25px_rgba(255,255,255,1)] uppercase tracking-[0.2em]" x-text="pending[p.id] ? '⏳ CLAIMING...' : (p.reserved ? 'RESERVED' : '⚡ CLAIM')"></span>

        </button>

      </div>

    </template>

  </div>

</div>

<script>
function app(){
return {

menuOpen:false,
filterOpen:false,

products:[],
pending:{},

search:'',
category:'ALL',

init(){

firebase.initializeApp({
apiKey:"AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg",
authDomain:"kurozenaku-gundam-store.firebaseapp.com",
projectId:"kurozenaku-gundam-store"
});

firebase.firestore()
.collection("products")
.onSnapshot(s=>{

this.products = s.docs.map(d=>({
id:d.id,
...d.data(),
reserved:d.data().reserved || false
}));

});

},

filteredProducts(){
return this.products.filter(p=>
(p.name || '').toLowerCase().includes(this.search.toLowerCase()) &&
(this.category==='ALL' || p.category===this.category)
);
},

async claimProduct(p){

if(p.stock <= 0 || this.pending[p.id] || p.reserved) return;

this.pending[p.id] = true;

try{

const claimRef = await firebase.firestore().collection("claims").add({
productId:p.id,
productName:p.name,
price:p.price,
status:"PENDING",
createdAt:new Date()
});

await firebase.firestore().collection("products").doc(p.id).update({
stock:p.stock - 1,
reserved:(p.stock - 1) <= 0
});

p.stock = p.stock - 1;
p.reserved = p.stock <= 0;

setTimeout(()=>{
const phone = "91XXXXXXXXXX";
const msg = `🛒 Claim\n${p.name}\nID:${claimRef.id}`;
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
},300);

}catch(e){
console.error("CLAIM ERROR:", e);
alert("Claim failed");
p.reserved = false;
}finally{
this.pending[p.id] = false;
}

}

}
}
</script>

</body>
</html>
